<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1A1F1B" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Expenses" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" href="icon-192.png" />
  <title>Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body, #root { margin: 0; padding: 0; min-height: 100vh; font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; color: #1A1F1B; }
    input, textarea, select { -webkit-user-select: text; user-select: text; font-family: inherit; }
    body {
      background:
        radial-gradient(ellipse 70% 50% at 80% 12%, rgba(151,196,89,0.35), transparent 60%),
        radial-gradient(ellipse 60% 50% at 15% 85%, rgba(220,235,200,0.6), transparent 65%),
        linear-gradient(165deg, #DCE7DD 0%, #C8DBC9 50%, #BFD4C0 100%);
      background-attachment: fixed;
      padding-top: env(safe-area-inset-top);
      min-height: 100vh;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes growBar { from { width: 0; } to { width: var(--w); } }
    @keyframes pulse { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    .anim-stagger > * { animation: fadeUp 0.5s ease-out both; }
    .anim-stagger > *:nth-child(1) { animation-delay: 0s; }
    .anim-stagger > *:nth-child(2) { animation-delay: 0.06s; }
    .anim-stagger > *:nth-child(3) { animation-delay: 0.12s; }
    .anim-stagger > *:nth-child(4) { animation-delay: 0.18s; }
    .anim-stagger > *:nth-child(5) { animation-delay: 0.24s; }
    .anim-stagger > *:nth-child(6) { animation-delay: 0.3s; }
    .anim-stagger > *:nth-child(7) { animation-delay: 0.36s; }
    .anim-stagger > *:nth-child(8) { animation-delay: 0.42s; }
    .bar-grow { animation: growBar 1s cubic-bezier(0.4, 0, 0.2, 1) 0.3s both; }
    .live-dot { animation: pulse 2s ease-in-out infinite; }
    .toast-anim { animation: slideDown 0.3s ease-out; }
    .sheet-anim { animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .modal-anim { animation: scaleIn 0.25s ease-out; }
    .glass { background: rgba(255,255,255,0.55); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border: 0.5px solid rgba(255,255,255,0.7); box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 6px 24px rgba(60,80,40,0.07); }
    .glass-strong { background: rgba(255,255,255,0.7); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); border: 0.5px solid rgba(255,255,255,0.85); box-shadow: 0 1px 0 rgba(255,255,255,0.75) inset, 0 8px 28px rgba(60,80,40,0.1); }
    .glass-dark { background: linear-gradient(145deg, rgba(26,31,27,0.96), rgba(45,53,48,0.93)); border: 0.5px solid rgba(255,255,255,0.08); box-shadow: 0 12px 32px rgba(26,31,27,0.18); }
    .tap-press { transition: transform 0.2s ease; }
    .tap-press:active { transform: scale(0.97); }
    .tap-strong { transition: transform 0.2s ease; }
    .tap-strong:active { transform: scale(0.93); }
    .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom), 1rem); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react" src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
